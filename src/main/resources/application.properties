spring.application.name=jee2026_exam_stu

spring.output.ansi.enabled=always
logging.level.web=debug
logging.level.cn.jee=debug
spring.mvc.log-request-details=true

spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
spring.datasource.url=jdbc:hsqldb:hsql://localhost;hsqldb.write_delay=false
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.org.hibernate.stat=debug
spring.jpa.properties.hibernate.generate_statistics=true

spring.web.error.include-binding-errors=always
spring.web.error.include-exception=true
spring.web.error.include-message=always
spring.web.error.include-stacktrace=always
